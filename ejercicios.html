<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/ejercicios.css">
</head>
<body>
  <section class="biblioteca-ejercicios">
    <div class="intro-ejercicios">
        <span class="badge">BIBLIOTECA PRO</span>
        <h2>Explora <span>Ejercicios.</span></h2>
        <p>Selecciona los movimientos para construir tu rutina personalizada.</p>
        
        <div class="barra-busqueda">
            <input type="text" placeholder="Buscar ejercicio (ej. Press banca)...">
            <select>
                <option value="">Todo el cuerpo</option>
                <option value="pecho">Pecho</option>
                <option value="piernas">Piernas</option>
                <option value="espalda">Espalda</option>
            </select>
        </div>
    </div>

    <div class="grid-container">
        <div class="card-gym">
            <div class="img-wrapper">
                <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=500" alt="Press Banca">
                <span class="tag-dificultad">INTERMEDIO</span>
            </div>
            <div class="card-body">
                <h3>Press de Banca</h3>
                <p>Pecho • Fuerza • Barra</p>
                <button class="btn-add-lista">+ AÑADIR A MI LISTA</button>
            </div>
        </div>

        <div class="card-gym">
            <div class="img-wrapper">
                <img src="https://images.unsplash.com/photo-1566241440091-ec10de8db2e1?q=80&w=500" alt="Sentadilla">
                <span class="tag-dificultad">AVANZADO</span>
            </div>
            <div class="card-body">
                <h3>Sentadilla con Barra</h3>
                <p>Piernas • Hipertrofia</p>
                <button class="btn-add-lista">+ AÑADIR A MI LISTA</button>
            </div>
        </div>
        
        </div>
</section>
</body>
</html>
